# Coldfire fork CI gate.
#
# Two jobs:
#   1. lint-and-test (Ubuntu) — runs `make lint`, `make test`, `make
#      license-check`. The license job is the hard gate that keeps the
#      runtime closure permissive-only; it must stay green for every PR.
#   2. smoke-apple-silicon (macos-latest) — runs `make test-smoke` which
#      boots a real server on Apple Silicon and exercises the chat and
#      embeddings smoke suites. macos-latest is Apple Silicon as of
#      late 2024; if GitHub re-maps the label we'll pin explicitly.
#
# Both jobs create a repo-local `.venv` so the Makefile's `.venv/bin/...`
# tool paths work without modification — matches developer-local
# behavior exactly.

name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Create venv and install pinned deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.lock
          .venv/bin/pip install pip-licenses ruff mypy
          # Editable install so `mypy app/ tools/` can resolve the package.
          .venv/bin/pip install -e . --no-deps

      - name: make lint
        run: make lint

      - name: make test
        run: make test

      - name: make license-check
        run: make license-check

  smoke-apple-silicon:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Cache HuggingFace model downloads so smoke runs don't re-fetch
      # the ~250MB tinyllama and ~150MB nomic-embed-v1.5 every push.
      # Key includes the model IDs we expect to pull so a config change
      # forces a fresh cache.
      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-llama32-1b-4bit-nomic-v15
          restore-keys: |
            hf-${{ runner.os }}-

      - name: Create venv and install
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.lock
          .venv/bin/pip install -e .

      - name: make test-smoke
        run: make test-smoke
