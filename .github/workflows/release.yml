# Coldfire fork release workflow — triggered on tag push (v0.1.0, etc.).
#
# Sequence:
#   1. Check out the tag.
#   2. Create a venv on macos-latest (Apple Silicon) and install pinned
#      runtime deps + pip-licenses + the package itself.
#   3. Run tools/generate_notices.sh -> NOTICES.txt.
#   4. Run `make license-check` as the hard release gate; if a new
#      transitive dependency picked up a copyleft license between the
#      last CI run and the tag push, this fails before any artifact
#      ships.
#   5. Create a GitHub Release for the tag, attach NOTICES.txt + the
#      requirements.lock from the tagged commit, auto-generate the
#      release notes from the commit log since the last tag.
#
# Note: we deliberately do NOT emit Formula/resources.rb here even
# though the original plan asked for it. The Homebrew formula uses
# `virtualenv_create` + `pip install -r requirements.lock` rather
# than `virtualenv_install_with_resources`, because three runtime
# deps (mlx, mlx-metal, torch) are wheel-only on PyPI — they have no
# sdist for `virtualenv_install_with_resources` to build from. The
# pip-based path resolves wheels natively and works for Apple
# Silicon out of the box.
#
# The Homebrew formula file itself is NOT pushed by this workflow —
# Task 32/33 (Phase 9) handles the homebrew-coldfire tap bump.

name: release

on:
  push:
    tags: ['v*.*.*']

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Create venv and install
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.lock pip-licenses
          # Editable install so `pip-licenses` sees the package + `poet`
          # can introspect our installed metadata to emit resources.rb.
          .venv/bin/pip install -e . --no-deps

      - name: Generate NOTICES.txt
        run: bash tools/generate_notices.sh

      - name: License gate
        run: make license-check

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            NOTICES.txt
            requirements.lock
          generate_release_notes: true
